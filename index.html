<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="floating-toggle" class="floating-toggle">

<div class="floating-wrapper">
    <div class="inner-buttons-wrapper">
        <div class="inner-buttons" data-test-id="floating-buttons-inner-buttons-container">
            <button class="inner-button" data-test-id="floating-buttons-inner-button">1</button>
            <button class="inner-button" data-test-id="floating-buttons-inner-button">2</button>
            <button class="inner-button" data-test-id="floating-buttons-inner-button">3</button>
            <button class="inner-button" data-test-id="floating-buttons-inner-button">4</button>
        </div>
    </div>

    <label for="floating-toggle" class="floating-button" data-test-id="floating-button">
            <span class="icon">
                <span class="icon-line vertical"></span>
                <span class="icon-line horizontal"></span>
            </span>
    </label>

</div>

</body>
</html>
